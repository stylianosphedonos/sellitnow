<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Product - Admin - Sellitnow</title>
  <script src="/js/brand-boot.js"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="/admin/products.html">← Products</a>
      <a href="/admin/">Dashboard</a>
      <a href="/admin/orders.html">Orders</a>
      <a href="/admin/customers.html">Customers</a>
      <a href="/admin/brand.html">Brand</a>
      <a href="/admin/settings.html">Settings</a>
      <a href="/admin/user-management.html">User Management</a>
      <a href="/">← Back to Store</a>
    </aside>
    <main class="admin-content">
      <h1>Edit Product</h1>
      <div id="error" class="alert alert-error" style="display:none"></div>
      <div id="formContainer"></div>
    </main>
  </div>
  <script src="/js/runtime-config.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if (!getToken() || getUser()?.role !== 'admin') window.location.href = '/login.html';
    const id = new URLSearchParams(location.search).get('id');
    if (!id) window.location.href = '/admin/products.html';

    let product;
    let categories = [];
    let editColors = [];
    let editSizes = [];

    async function loadCategories() {
      try {
        const res = await callApi('/categories');
        categories = res.categories || [];
      } catch (err) {
        console.warn('Could not load categories', err);
      }
    }

    async function loadProduct() {
      try {
        const data = await callApi('/products/' + id);
        product = data.product;
        if (!product) throw new Error('Product not found');
        renderForm();
      } catch (err) {
        document.getElementById('formContainer').innerHTML = '<p>Failed to load product. ' + (err.message || '') + '</p>';
      }
    }

    function renderForm() {
      const catOptions = categories.map(c =>
        `<option value="${c.id}" ${product.category_id == c.id ? 'selected' : ''}>${c.name}</option>`
      ).join('');
      document.getElementById('formContainer').innerHTML = `
        <form id="editForm" style="max-width:600px;background:white;padding:24px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
          <div class="form-group">
            <label>Title *</label>
            <input type="text" name="title" value="${escapeHtml(product.title || '')}" required>
          </div>
          <div class="form-group">
            <label>SKU *</label>
            <input type="text" name="sku" value="${escapeHtml(product.sku || '')}" required>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="4" style="width:100%;padding:12px;border:1px solid #eee;border-radius:8px">${escapeHtml(product.description || '')}</textarea>
          </div>
          <div class="form-group">
            <label>Price *</label>
            <input type="number" step="0.01" name="price" value="${product.price || ''}" required>
          </div>
          <div class="form-group">
            <label>Stock Quantity</label>
            <input type="number" name="stock_quantity" value="${product.stock_quantity ?? 0}" min="0">
          </div>
          <div class="form-group">
            <label>Category</label>
            <select name="category_id">
              <option value="">-- None --</option>
              ${catOptions}
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select name="status">
              <option value="draft" ${product.status==='draft'?'selected':''}>Draft</option>
              <option value="active" ${product.status==='active'?'selected':''}>Active</option>
              <option value="archived" ${product.status==='archived'?'selected':''}>Archived</option>
            </select>
          </div>
          <div class="form-group">
            <label>Colors (storefront)</label>
            <div id="editColorChips" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;min-height:28px"></div>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="text" id="inputEditColor" placeholder="e.g. Navy" style="flex:1;padding:10px;border:1px solid #eee;border-radius:8px">
              <button type="button" class="btn" style="max-width:100px;padding:8px 12px" id="btnAddEditColor">Add</button>
            </div>
          </div>
          <div class="form-group">
            <label>Sizes (storefront)</label>
            <div id="editSizeChips" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;min-height:28px"></div>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="text" id="inputEditSize" placeholder="e.g. XXL" style="flex:1;padding:10px;border:1px solid #eee;border-radius:8px">
              <button type="button" class="btn" style="max-width:100px;padding:8px 12px" id="btnAddEditSize">Add</button>
            </div>
          </div>
          <div class="form-group">
            <label>Current Images</label>
            <div id="currentImages" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px">
              ${(product.images || []).map(img => `
                <div style="position:relative">
                  <img src="${img.image_url}" alt="" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #eee">
                </div>
              `).join('')}
              ${!(product.images && product.images.length) ? '<span style="color:#999">No images yet</span>' : ''}
            </div>
          </div>
          <div class="form-group">
            <label>Upload New Image(s)</label>
            <input type="file" name="images" accept="image/jpeg,image/png,image/webp,image/gif" multiple>
            <small style="color:#666">JPEG, PNG, WebP or GIF. Max 5MB each. Up to 5 images per product.</small>
          </div>
          <div style="display:flex;gap:12px;margin-top:24px">
            <button type="submit" class="btn" style="max-width:150px">Save Changes</button>
            <a href="/admin/products.html" class="btn btn-secondary" style="max-width:150px;text-align:center;text-decoration:none;display:inline-block">Cancel</a>
          </div>
        </form>
      `;

      const form = document.getElementById('editForm');
      form.addEventListener('submit', handleSubmit);

      editColors = [...(product.options?.colors || [])];
      editSizes = [...(product.options?.sizes || [])];

      function paintVariantChips() {
        const chipStyle = 'display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:#f5f5f5;border-radius:20px;font-size:13px';
        const cEl = document.getElementById('editColorChips');
        const sEl = document.getElementById('editSizeChips');
        cEl.innerHTML = editColors.map((x, i) =>
          `<span style="${chipStyle}">${escapeHtml(x)}<button type="button" class="variant-chip-remove" data-ctype="color" data-i="${i}" style="border:none;background:none;cursor:pointer;font-size:16px;line-height:1;padding:0 2px" aria-label="Remove">×</button></span>`
        ).join('') || '<span style="color:#999;font-size:13px">No colors yet</span>';
        sEl.innerHTML = editSizes.map((x, i) =>
          `<span style="${chipStyle}">${escapeHtml(x)}<button type="button" class="variant-chip-remove" data-ctype="size" data-i="${i}" style="border:none;background:none;cursor:pointer;font-size:16px;line-height:1;padding:0 2px" aria-label="Remove">×</button></span>`
        ).join('') || '<span style="color:#999;font-size:13px">No sizes yet</span>';
      }

      paintVariantChips();

      form.addEventListener('click', (e) => {
        const rm = e.target.closest('.variant-chip-remove');
        if (!rm) return;
        const i = parseInt(rm.dataset.i, 10);
        if (rm.dataset.ctype === 'color') editColors.splice(i, 1);
        else editSizes.splice(i, 1);
        paintVariantChips();
      });

      document.getElementById('btnAddEditColor').addEventListener('click', () => {
        const v = document.getElementById('inputEditColor').value.trim();
        if (v && !editColors.includes(v)) editColors.push(v);
        document.getElementById('inputEditColor').value = '';
        paintVariantChips();
      });
      document.getElementById('btnAddEditSize').addEventListener('click', () => {
        const v = document.getElementById('inputEditSize').value.trim();
        if (v && !editSizes.includes(v)) editSizes.push(v);
        document.getElementById('inputEditSize').value = '';
        paintVariantChips();
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const submitBtn = form.querySelector('button[type="submit"]');
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';

      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving...';

      const productData = {
        title: form.title.value,
        sku: form.sku.value,
        description: form.description.value,
        price: parseFloat(form.price.value) || 0,
        stock_quantity: parseInt(form.stock_quantity.value, 10) || 0,
        category_id: form.category_id.value ? parseInt(form.category_id.value, 10) : null,
        status: form.status.value,
        options: { colors: [...editColors], sizes: [...editSizes] }
      };

      try {
        await callApi('/admin/products/' + id, {
          method: 'PUT',
          body: JSON.stringify(productData)
        });

        const fileInput = form.images;
        if (fileInput && fileInput.files && fileInput.files.length > 0) {
          const formData = new FormData();
          for (let i = 0; i < fileInput.files.length; i++) {
            formData.append('images', fileInput.files[i]);
          }
          const imgRes = await fetch(sellitnowApiUrl('/admin/products/' + id + '/images'), {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + getToken() },
            body: formData
          });
          const imgData = await imgRes.json().catch(() => ({}));
          if (!imgRes.ok) throw new Error(imgData.error || 'Failed to upload images');
        }

        window.location.href = '/admin/products.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Save Changes';
      }
    }

    (async () => {
      await loadCategories();
      await loadProduct();
    })();
  </script>
</body>
</html>
