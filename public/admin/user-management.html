<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management - Admin - Sellitnow</title>
  <script src="/js/brand-boot.js"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="/admin/">Dashboard</a>
      <a href="/admin/products.html">Products</a>
      <a href="/admin/categories.html">Categories</a>
      <a href="/admin/orders.html">Orders</a>
      <a href="/admin/customers.html">Customers</a>
      <a href="/admin/brand.html">Brand</a>
      <a href="/admin/settings.html">Settings</a>
      <a href="/admin/user-management.html" class="active">User Management</a>
      <a href="/" style="margin-top:20px">← Back to Store</a>
    </aside>
    <main class="admin-content">
      <h1>User Management</h1>
      <p style="margin-bottom:24px;color:var(--text-muted)">Manage users who can access the admin panel.</p>

      <div id="alert" class="alert" style="display:none;margin-bottom:24px"></div>

      <div style="display:grid;gap:32px;max-width:900px">
        <!-- Current user: change password -->
        <section id="changePasswordSection" style="background:white;padding:24px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
          <h2 style="font-size:18px;margin-bottom:8px">Change my password</h2>
          <p id="changePasswordHint" style="margin:0 0 20px;color:var(--text-muted);font-size:14px"></p>
          <form id="changePasswordForm" style="display:grid;grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));gap:16px;align-items:end;max-width:700px">
            <div class="form-group">
              <label>New password *</label>
              <input type="password" id="newPassword" name="new_password" required minlength="8" autocomplete="new-password" placeholder="Min 8 characters">
            </div>
            <div class="form-group">
              <label>Confirm new password *</label>
              <input type="password" id="confirmPassword" name="confirm_password" required minlength="8" autocomplete="new-password" placeholder="Re-enter password">
            </div>
            <div class="form-group">
              <button type="submit" class="btn" style="max-width:200px">Update password</button>
            </div>
          </form>
        </section>

        <!-- Add user -->
        <section style="background:white;padding:24px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
          <h2 style="font-size:18px;margin-bottom:20px">Add Admin User</h2>
          <form id="addUserForm" style="display:grid;grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));gap:16px;align-items:end">
            <div class="form-group">
              <label>Email *</label>
              <input type="email" name="email" required placeholder="admin@example.com">
            </div>
            <div class="form-group">
              <label>Password *</label>
              <input type="password" name="password" required minlength="8" placeholder="Min 8 characters">
            </div>
            <div class="form-group">
              <label>First Name *</label>
              <input type="text" name="first_name" required>
            </div>
            <div class="form-group">
              <label>Last Name *</label>
              <input type="text" name="last_name" required>
            </div>
            <div class="form-group">
              <button type="submit" class="btn" style="max-width:140px">Create User</button>
            </div>
          </form>
        </section>

        <!-- Admin users list -->
        <section style="background:white;padding:24px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
          <h2 style="font-size:18px;margin-bottom:20px">Admin Users</h2>
          <div id="usersList"></div>
        </section>
      </div>
    </main>
  </div>
  <script src="/js/runtime-config.js"></script>
  <script src="/js/app.js"></script>
  <script>
    const me = getUser();
    if (!getToken() || me?.role !== 'admin') {
      window.location.href = '/login.html?redirect=' + encodeURIComponent('/admin/user-management.html');
    }

    const alertEl = document.getElementById('alert');
    const changePasswordHint = document.getElementById('changePasswordHint');
    if (me?.email) {
      changePasswordHint.textContent = `Signed in as ${me.email}. Your session stays valid until it expires; log in again if you want a fresh token after changing password.`;
    }

    function showMsg(msg, isError) {
      alertEl.textContent = msg;
      alertEl.className = 'alert ' + (isError ? 'alert-error' : 'alert-success');
      alertEl.style.display = 'block';
      setTimeout(() => { alertEl.style.display = 'none'; }, 4000);
    }

    async function loadUsers() {
      try {
        const data = await callApi('/admin/users');
        const users = data.users || [];
        document.getElementById('usersList').innerHTML = users.length
          ? `
            <table class="table">
              <tr><th>Email</th><th>Name</th><th>Created</th></tr>
              ${users.map(u => `
                <tr>
                  <td>${u.email}</td>
                  <td>${u.first_name} ${u.last_name}</td>
                  <td>${new Date(u.created_at).toLocaleDateString()}</td>
                </tr>
              `).join('')}
            </table>
          `
          : '<p style="color:var(--text-muted)">No admin users yet.</p>';
      } catch (err) {
        document.getElementById('usersList').innerHTML = '<p>Failed to load users.</p>';
      }
    }

    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      let uid = getUser()?.id ?? me?.id;
      if (!uid && getToken()) {
        try {
          const { user } = await callApi('/auth/me');
          if (user?.id) {
            uid = user.id;
            setUser({ ...getUser(), ...user });
          }
        } catch (_) {}
      }
      if (!uid) {
        showMsg('Could not determine your user id. Please log out and log in again.', true);
        return;
      }
      const newPwd = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      if (newPwd !== confirm) {
        showMsg('New password and confirmation do not match.', true);
        return;
      }
      const form = e.target;
      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';
      try {
        await callApi(`/admin/users/${uid}/reset-password`, {
          method: 'POST',
          body: JSON.stringify({ new_password: newPwd })
        });
        form.reset();
        showMsg('Password updated successfully.');
      } catch (err) {
        showMsg(err.message || 'Failed to update password.', true);
      }
      submitBtn.disabled = false;
      submitBtn.textContent = 'Update password';
    });

    document.getElementById('addUserForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating...';
      try {
        const data = Object.fromEntries(new FormData(form));
        await callApi('/admin/users', {
          method: 'POST',
          body: JSON.stringify(data)
        });
        form.reset();
        showMsg('Admin user created. They can now log in with the admin panel.');
        loadUsers();
      } catch (err) {
        showMsg(err.message || 'Failed to create user.', true);
      }
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create User';
    });

    loadUsers();
  </script>
</body>
</html>
