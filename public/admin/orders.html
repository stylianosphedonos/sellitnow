<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Admin - 3nitylab</title>
  <script src="/js/brand-boot.js"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="/admin/">Dashboard</a>
      <a href="/admin/products.html">Products</a>
      <a href="/admin/categories.html">Categories</a>
      <a href="/admin/orders.html">Orders</a>
      <a href="/admin/customers.html">Customers</a>
      <a href="/admin/brand.html">Brand</a>
      <a href="/admin/settings.html">Settings</a>
      <a href="/admin/user-management.html">User Management</a>
      <a href="/">← Back to Store</a>
    </aside>
    <main class="admin-content">
      <h1>Orders</h1>
      <div id="ordersMessage" style="display:none;padding:10px 12px;border-radius:6px;margin-bottom:12px"></div>
      <div class="form-group" style="max-width:300px;margin-bottom:16px">
        <input type="text" id="searchOrders" placeholder="Search by order # or email" style="width:100%">
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
        <select id="bulkStatus" aria-label="Bulk status">
          <option value="">Update selected to...</option>
          <option value="pending">Pending</option>
          <option value="processing">Processing</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <button id="applyBulkStatus" class="btn" style="max-width:220px">Apply to selected orders</button>
      </div>
      <div id="orders"></div>
    </main>
  </div>
  <script src="/js/runtime-config.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/admin-layout.js"></script>
  <script>
    if (!getToken() || getUser()?.role !== 'admin') window.location.href = '/login.html?redirect=' + encodeURIComponent('/admin/orders.html');

    function showOrdersMessage(message, isError = false) {
      const el = document.getElementById('ordersMessage');
      if (!el) return;
      el.textContent = message;
      el.style.display = 'block';
      el.style.background = isError ? '#fee2e2' : '#dcfce7';
      el.style.color = isError ? '#991b1b' : '#166534';
      if (!isError) {
        clearTimeout(window.ordersMessageTimeout);
        window.ordersMessageTimeout = setTimeout(() => {
          el.style.display = 'none';
        }, 2500);
      }
    }

    async function loadOrders(search = '') {
      try {
        await loadBrandSettings();
        const data = await callApi('/admin/orders?search=' + encodeURIComponent(search));
        const items = data.items || [];
        document.getElementById('orders').innerHTML = `
          <table class="table">
            <tr><th><input type="checkbox" id="selectAllOrders" aria-label="Select all orders"></th><th>Order #</th><th>Customer</th><th>Total</th><th>Status</th><th>Payment</th><th>Date</th><th>Actions</th></tr>
            ${items.map(o => `
              <tr data-order-id="${o.id}">
                <td><input type="checkbox" class="order-select" value="${o.id}" aria-label="Select order ${o.order_number}"></td>
                <td>${o.order_number}</td>
                <td>${o.guest_email || o.user_email || '-'}</td>
                <td>${formatStoreMoney(o.total_amount)}</td>
                <td class="order-status">${o.status}</td>
                <td>${o.payment_method === 'pay_on_delivery' ? 'On delivery' : 'Card'} · ${o.payment_status}</td>
                <td>${new Date(o.created_at).toLocaleDateString()}</td>
                <td><a href="/admin/order.html?id=${o.id}" style="color:var(--primary)">View</a></td>
              </tr>
            `).join('')}
          </table>
        `;
        document.getElementById('selectAllOrders')?.addEventListener('change', (e) => {
          document.querySelectorAll('.order-select').forEach((cb) => {
            cb.checked = e.target.checked;
          });
        });
      } catch (err) {
        document.getElementById('orders').innerHTML = '<p>Failed to load orders.</p>';
      }
    }

    async function applyBulkStatusUpdate() {
      const status = document.getElementById('bulkStatus')?.value;
      const selectedIds = Array.from(document.querySelectorAll('.order-select:checked')).map((cb) => Number(cb.value));
      if (!status) {
        showOrdersMessage('Please select a status first.', true);
        return;
      }
      if (!selectedIds.length) {
        showOrdersMessage('Please select at least one order.', true);
        return;
      }

      const button = document.getElementById('applyBulkStatus');
      const originalText = button?.textContent || 'Apply to selected orders';
      if (button) {
        button.disabled = true;
        button.textContent = 'Updating...';
      }

      try {
        const result = await callApi('/admin/orders/status/bulk', {
          method: 'PATCH',
          body: JSON.stringify({ order_ids: selectedIds, status })
        });
        const updatedOrders = result.orders || [];
        for (const order of updatedOrders) {
          const row = document.querySelector(`tr[data-order-id="${order.id}"]`);
          row?.querySelector('.order-status')?.replaceChildren(document.createTextNode(order.status));
        }
        showOrdersMessage(`Updated ${updatedOrders.length} order${updatedOrders.length === 1 ? '' : 's'} to "${status}".`);
      } catch (err) {
        showOrdersMessage(err.message || 'Failed to update selected orders.', true);
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent = originalText;
        }
      }
    }

    document.getElementById('searchOrders')?.addEventListener('input', (e) => {
      clearTimeout(window.searchTimeout);
      window.searchTimeout = setTimeout(() => loadOrders(e.target.value), 300);
    });
    document.getElementById('applyBulkStatus')?.addEventListener('click', applyBulkStatusUpdate);

    loadOrders();
  </script>
</body>
</html>
