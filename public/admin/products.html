<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Admin - 3nitylab</title>
  <script src="/js/brand-boot.js"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="/admin/">Dashboard</a>
      <a href="/admin/products.html">Products</a>
      <a href="/admin/categories.html">Categories</a>
      <a href="/admin/orders.html">Orders</a>
      <a href="/admin/customers.html">Customers</a>
      <a href="/admin/brand.html">Brand</a>
      <a href="/admin/settings.html">Settings</a>
      <a href="/admin/user-management.html">User Management</a>
      <a href="/">← Back to Store</a>
    </aside>
    <main class="admin-content">
      <h1>Products</h1>
      <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:16px">
        <button class="btn" style="max-width:150px" type="button" onclick="document.getElementById('productForm').style.display='block'">Add Product</button>
        <div class="form-group" style="margin:0;min-width:220px;flex:1;max-width:420px">
          <label for="productSearchTitle" style="display:block;margin-bottom:6px;font-size:14px">Search by title</label>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="search" id="productSearchTitle" placeholder="e.g. headphones" autocomplete="off" style="flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px">
            <button type="button" class="btn" id="productSearchBtn" style="max-width:120px;white-space:nowrap">Search</button>
          </div>
        </div>
      </div>
      <div id="productForm" style="display:none;background:white;padding:24px;border-radius:8px;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
        <h3>New Product</h3>
        <form id="addProduct">
          <div class="form-group">
            <label>Title *</label>
            <input type="text" name="title" required>
          </div>
          <div class="form-group">
            <label>SKU *</label>
            <input type="text" name="sku" required>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="3" style="width:100%;padding:12px;border:1px solid #eee;border-radius:8px"></textarea>
          </div>
          <div class="form-group">
            <label>Price *</label>
            <input type="number" step="0.01" name="price" required>
          </div>
          <div class="form-group">
            <label>Delivery cost (optional)</label>
            <input type="number" step="0.01" min="0" name="delivery_cost" placeholder="Store default">
            <small style="color:#666">Override per SKU; leave blank to use Settings → default delivery.</small>
          </div>
          <div class="form-group">
            <label>Stock Quantity</label>
            <input type="number" name="stock_quantity" value="0">
          </div>
          <div class="form-group">
            <label>Categories</label>
            <select id="createProductCategories" name="category_ids" multiple size="6"></select>
            <small style="color:#666">Hold Cmd/Ctrl to select multiple categories.</small>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select name="status"><option value="draft">Draft</option><option value="active">Active</option><option value="archived">Archived</option></select>
          </div>
          <div class="form-group">
            <label>Product Image(s)</label>
            <input type="file" name="images" accept="image/jpeg,image/png,image/webp,image/gif" multiple>
            <small style="color:#666">JPEG, PNG, WebP or GIF. Max 5MB each. Up to 5 images per product.</small>
          </div>
          <button type="submit" class="btn">Create Product</button>
        </form>
      </div>
      <div id="products"></div>
    </main>
  </div>
  <script src="/js/runtime-config.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/admin-layout.js"></script>
  <script>
    if (!getToken() || getUser()?.role !== 'admin') window.location.href = '/login.html?redirect=' + encodeURIComponent('/admin/products.html');
    let categories = [];

    async function loadCategories() {
      try {
        const data = await callApi('/categories');
        categories = data.categories || [];
      } catch (_) {
        categories = [];
      }
      const select = document.getElementById('createProductCategories');
      if (!select) return;
      select.innerHTML = categories.map((c) => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    function currentProductTitleQuery() {
      return (document.getElementById('productSearchTitle')?.value || '').trim();
    }

    async function loadProducts() {
      try {
        await loadBrandSettings();
        const q = currentProductTitleQuery();
        const qs = new URLSearchParams({ limit: '100', _: String(Date.now()) });
        if (q) qs.set('q', q);
        const data = await callApi('/admin/products?' + qs.toString(), { cache: 'no-store' });
        const items = data.items || [];
        const hint = q
          ? `<p style="margin:0 0 12px;font-size:14px;color:var(--text-muted)">${items.length ? `Showing ${items.length} of ${data.total} matching “${escapeAttr(q)}”.` : `No products match “${escapeAttr(q)}”.`} <button type="button" class="btn btn-secondary" style="margin-left:8px;padding:4px 10px;font-size:12px" id="productSearchClear">Clear search</button></p>`
          : '';
        document.getElementById('products').innerHTML = hint + `
          <table class="table">
            <tr><th>ID</th><th>SKU</th><th>Title</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr>
            ${items.length ? items.map(p => `
              <tr>
                <td>${p.id}</td>
                <td>${p.sku}</td>
                <td>${p.title}</td>
                <td>${formatStoreMoney(p.price)}</td>
                <td>${p.stock_quantity}</td>
                <td>${p.status}</td>
                <td><button class="btn" style="padding:6px 12px;font-size:12px" onclick="editProduct(${p.id})">Edit</button></td>
              </tr>
            `).join('') : '<tr><td colspan="7" style="padding:16px;color:var(--text-muted)">No products to show.</td></tr>'}
          </table>
        `;
        document.getElementById('productSearchClear')?.addEventListener('click', () => {
          const inp = document.getElementById('productSearchTitle');
          if (inp) inp.value = '';
          loadProducts();
        });
      } catch (err) {
        document.getElementById('products').innerHTML = '<p>Failed to load products. Make sure you are logged in as admin.</p>';
      }
    }

    function escapeAttr(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    document.getElementById('productSearchBtn')?.addEventListener('click', () => loadProducts());
    document.getElementById('productSearchTitle')?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        loadProducts();
      }
    });

    document.getElementById('addProduct')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData(form);
      const data = Object.fromEntries(formData);
      data.stock_quantity = parseInt(data.stock_quantity) || 0;
      const dRaw = String(data.delivery_cost || '').trim();
      if (dRaw === '') delete data.delivery_cost;
      else data.delivery_cost = parseFloat(dRaw);
      data.category_ids = Array.from(form.category_ids.selectedOptions || [])
        .map((opt) => parseInt(opt.value, 10))
        .filter((x) => Number.isInteger(x));
      try {
        const created = await callApi('/admin/products', { method: 'POST', body: JSON.stringify(data) });
        const productId = created?.product?.id;
        const files = formData.getAll('images').filter((f) => f && typeof f === 'object' && f.size > 0);

        if (productId && files.length) {
          const imageData = new FormData();
          for (const file of files) imageData.append('images', file);
          const uploadRes = await sellitnowFetchWithCsrf(sellitnowApiUrl('/admin/products/' + productId + '/images'), {
            method: 'POST',
            body: imageData
          });
          const uploadJson = await uploadRes.json().catch(() => ({}));
          if (!uploadRes.ok) {
            throw new Error(uploadJson.error || 'Product created, but image upload failed.');
          }
        }

        form.reset();
        document.getElementById('productForm').style.display = 'none';
        loadProducts();
      } catch (err) {
        alert(err.message);
      }
    });

    function editProduct(id) {
      window.location.href = '/admin/product-edit.html?id=' + id;
    }

    loadCategories().then(loadProducts);

    window.addEventListener('pageshow', (e) => {
      if (e.persisted) loadCategories().then(loadProducts);
    });
  </script>
</body>
</html>
