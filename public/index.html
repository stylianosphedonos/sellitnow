<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sellitnow - Shop Deals & Save Big</title>
  <script src="/js/brand-boot.js"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">Sellitnow</a>
      <div class="search-bar">
        <input type="search" placeholder="Search products..." id="searchInput">
        <button type="button" class="btn-search">Search</button>
      </div>
      <nav class="nav">
        <a href="/cart.html" class="nav-link cart-link">
          Cart <span class="cart-count" id="cartCount">0</span>
        </a>
        <a href="/login.html" class="nav-link" id="loginBtn">Login</a>
        <a href="/admin/" class="nav-link" id="adminBtn" style="display:none">Manage</a>
        <a href="/profile.html" class="nav-link" id="profileBtn" style="display:none">Account</a>
        <button class="nav-link" id="logoutBtn" style="display:none">Logout</button>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="hero__inner">
      <h1 id="heroTitle">Up to 90% Off</h1>
      <p id="heroSubtitle">Discover amazing deals on electronics, fashion & more</p>
    </div>
  </section>

  <main class="main">
    <section class="categories" id="categories">
      <h2>Shop by Category</h2>
      <div class="category-grid" id="categoryGrid"></div>
    </section>

    <section class="products">
      <h2>Trending Deals</h2>
      <div class="product-grid" id="productGrid"></div>
      <div class="pagination" id="pagination"></div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; Sellitnow. All rights reserved.</p>
  </footer>

  <script src="/js/runtime-config.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
