<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sellitnow</title>
  <script src="/js/brand-boot.js"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">Sellitnow</a>
      <nav class="nav">
        <a href="/" class="nav-link">Home</a>
        <a href="/login.html" class="nav-link">Login</a>
      </nav>
    </div>
  </header>

  <main>
    <div id="loginForm" class="form-container">
      <h1>Login</h1>
      <div id="loginError" class="alert alert-error" style="display:none"></div>
      <form id="login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn">Login</button>
      </form>
      <p class="form-footer">Don't have an account? <a href="#" id="showRegister">Register</a></p>
    </div>

    <div id="registerForm" class="form-container" style="display:none">
      <h1>Register</h1>
      <div id="registerError" class="alert alert-error" style="display:none"></div>
      <form id="register">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" name="first_name" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" name="last_name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required>
        </div>
        <div class="form-group">
          <label>Password (min 8 characters)</label>
          <input type="password" name="password" required minlength="8">
        </div>
        <div class="form-group">
          <label>Phone (optional)</label>
          <input type="tel" name="phone">
        </div>
        <button type="submit" class="btn">Register</button>
      </form>
      <p class="form-footer">Already have an account? <a href="#" id="showLogin">Login</a></p>
    </div>
  </main>

  <script src="/js/runtime-config.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
