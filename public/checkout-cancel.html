<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout cancelled - Sellitnow</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">Sellitnow</a>
      <nav class="nav">
        <a href="/cart.html" class="nav-link">Cart</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div style="max-width:500px;margin:60px auto;background:white;padding:40px;border-radius:12px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.08)">
      <h1 style="margin-bottom:16px">Checkout cancelled</h1>
      <p style="color:#666;margin-bottom:24px">Your payment was not completed. Your cart is unchanged and no charge was made.</p>
      <a href="/cart.html" class="btn" style="display:inline-block;text-decoration:none;margin-right:12px">Back to cart</a>
      <a href="/" class="btn btn-secondary" style="display:inline-block;text-decoration:none">Continue shopping</a>
    </div>
  </main>
</body>
</html>
