<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account - 3nitylab</title>
  <script src="/js/brand-boot.js"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">3nitylab</a>
      <nav class="nav">
        <a href="/" class="nav-link">Home</a>
        <a href="/admin/" class="nav-link" id="adminLink" style="display:none">Manage</a>
        <button class="nav-link" id="logoutBtn">Logout</button>
      </nav>
    </div>
  </header>

  <main class="main">
    <h1>My Account</h1>
    <div id="profile"></div>
    <h2 style="margin-top:32px">Order History</h2>
    <div id="orders"></div>
  </main>

  <script src="/js/runtime-config.js"></script>
  <script src="/js/app.js"></script>
  <script>
    const user = getUser();
    if (!user) { window.location.href = '/login.html'; }

    if (user?.role === 'admin') document.getElementById('adminLink').style.display = 'inline';
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      setToken(null);
      setUser(null);
      window.location.href = '/';
    });

    async function loadProfile() {
      try {
        const { user: profile } = await callApi('/auth/me');
        document.getElementById('profile').innerHTML = `
          <div style="background:white;padding:24px;border-radius:12px;max-width:500px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
            <p><strong>Name:</strong> ${profile.first_name} ${profile.last_name}</p>
            <p><strong>Email:</strong> ${profile.email}</p>
            ${profile.phone ? '<p><strong>Phone:</strong> ' + profile.phone + '</p>' : ''}
          </div>
        `;
      } catch (err) {
        document.getElementById('profile').innerHTML = '<p>Failed to load profile.</p>';
      }
    }

    async function loadOrders() {
      try {
        const data = await callApi('/orders');
        const items = data.items || [];
        if (items.length === 0) {
          document.getElementById('orders').innerHTML = '<p>No orders yet.</p>';
          return;
        }
        document.getElementById('orders').innerHTML = `
          <div class="table">
            <table style="width:100%;border-collapse:collapse">
              <tr><th>Order #</th><th>Status</th><th>Payment</th><th>Total</th><th>Date</th></tr>
              ${items.map(o => `
                <tr>
                  <td>${o.order_number}</td>
                  <td>${o.status}</td>
                  <td>${o.payment_method === 'pay_on_delivery' ? 'On delivery (' + o.payment_status + ')' : o.payment_status}</td>
                  <td>${formatStoreMoney(o.total_amount)}</td>
                  <td>${new Date(o.created_at).toLocaleDateString()}</td>
                </tr>
              `).join('')}
            </table>
          </div>
        `;
      } catch (err) {
        document.getElementById('orders').innerHTML = '<p>Failed to load orders.</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await loadBrandSettings();
      loadProfile();
      await loadOrders();
    });

    window.addEventListener('pageshow', (e) => {
      if (!e.persisted || typeof loadBrandSettings !== 'function') return;
      loadBrandSettings().then(() => loadOrders());
    });
  </script>
</body>
</html>
